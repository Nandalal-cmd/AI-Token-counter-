<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI Token Counter Settings</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			font-size: 13px;
			width: 380px;
			padding: 16px;
			background: #1a1a1a;
			color: #e0e0e0;
		}
		h1 { font-size: 16px; margin-bottom: 16px; color: #fff; }
		.section { margin-bottom: 16px; }
		.section h2 { font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
		.site-row {
			display: flex; align-items: center; justify-content: space-between;
			padding: 6px 8px; background: #262626; border-radius: 4px; margin-bottom: 4px;
		}
		.site-name { font-weight: 600; min-width: 80px; }
		.site-input { width: 80px; padding: 2px 6px; border: 1px solid #444; border-radius: 3px; background: #1a1a1a; color: #e0e0e0; font-size: 12px; text-align: right; }
		.site-input:focus { outline: none; border-color: #2c84db; }
		.pref-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px; }
		.pref-row label { cursor: pointer; }
		.switch { position: relative; width: 36px; height: 20px; }
		.switch input { opacity: 0; width: 0; height: 0; }
		.slider {
			position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
			background: #444; border-radius: 20px; transition: 0.2s;
		}
		.slider::before {
			content: ''; position: absolute; height: 16px; width: 16px; left: 2px; bottom: 2px;
			background: #fff; border-radius: 50%; transition: 0.2s;
		}
		.switch input:checked + .slider { background: #2c84db; }
		.switch input:checked + .slider::before { transform: translateX(16px); }
		.btn {
			width: 100%; padding: 8px; border: none; border-radius: 4px;
			background: #2c84db; color: #fff; font-size: 13px; cursor: pointer;
		}
		.btn:hover { background: #3a92e8; }
		.status { font-size: 11px; color: #888; text-align: center; margin-top: 8px; }
		.actions { display: flex; gap: 8px; }
		.actions .btn { flex: 1; }
		.btn-secondary { background: #444; }
		.btn-secondary:hover { background: #555; }
	</style>
</head>
<body>
	<h1>AI Token Counter</h1>

	<div class="section">
		<h2>Context Limits per Platform</h2>
		<div id="limits-container"></div>
	</div>

	<div class="section">
		<h2>Cost per 1K Tokens ($)</h2>
		<div id="pricing-container"></div>
	</div>

	<div class="section">
		<h2>Bar Colors</h2>
		<div class="pref-row">
			<label for="colorNormal">Normal fill</label>
			<input type="color" id="colorNormal" value="#2c84db" style="width:40px;height:24px;padding:0;border:1px solid #444;border-radius:3px;background:none;cursor:pointer;">
		</div>
		<div class="pref-row">
			<label for="colorWarn">Warning (80%)</label>
			<input type="color" id="colorWarn" value="#d4a017" style="width:40px;height:24px;padding:0;border:1px solid #444;border-radius:3px;background:none;cursor:pointer;">
		</div>
		<div class="pref-row">
			<label for="colorCritical">Critical/Danger (90%+)</label>
			<input type="color" id="colorCritical" value="#ce2029" style="width:40px;height:24px;padding:0;border:1px solid #444;border-radius:3px;background:none;cursor:pointer;">
		</div>
	</div>

	<div class="section">
		<h2>Preferences</h2>
		<div class="pref-row">
			<label for="toggleCost">Show cost estimate</label>
			<label class="switch"><input type="checkbox" id="toggleCost" checked><span class="slider"></span></label>
		</div>
		<div class="pref-row">
			<label for="toggleThreshold">Threshold warnings</label>
			<label class="switch"><input type="checkbox" id="toggleThreshold" checked><span class="slider"></span></label>
		</div>
		<div class="pref-row">
			<label for="toggleNotifications">Desktop notifications</label>
			<label class="switch"><input type="checkbox" id="toggleNotifications" checked><span class="slider"></span></label>
		</div>
	</div>

	<div class="actions">
		<button class="btn" id="saveBtn">Save Settings</button>
		<button class="btn btn-secondary" id="resetBtn">Reset to Defaults</button>
	</div>
	<div class="status" id="status"></div>

	<script src="popup.js"></script>
</body>
</html>
